name: game-theory
# Game Theory - docker-compose.yml
# Generated by gsd-init | 2026-03-28
# Modules: django, postgresql, redis, celery, social_auth, jwt, rest_api, graphql, file_encryption, docker, cicd, monitoring, testing, linting

services:
  web:
    container_name: game-theory-web
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - D:/Dev/game-theory:/app
    ports:
      - "8001:8000"
    env_file: .env.docker
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  db:
    container_name: game-theory-db
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    container_name: game-theory-redis
    image: redis:7-alpine
    ports:
      - "6380:6379"

  worker:
    container_name: game-theory-worker
    build:
      context: .
      dockerfile: docker/Dockerfile
    entrypoint: []
    command: celery -A config worker -l info
    volumes:
      - D:/Dev/game-theory:/app
    env_file: .env.docker
    depends_on:
      web:
        condition: service_started
      redis:
        condition: service_started

volumes:
  postgres_data:

